# Clash Smart v5.2.4-oc — OpenClash 覆写模块
# 387 rule-providers + 963 rules
# FIXED v5.2.4-oc:
#   FIX#1: CHINA_IP_ROUTE 0 → 避免 OpenClash Step3 注入裸 "geosite" 引用导致 parse error
#   FIX#2: 添加 GEOSITE_CUSTOM_URL → 确保 geosite.dat 来源正确
#   FIX#3: ENABLE_RESPECT_RULES 保持 0 (不覆写) → 由覆写脚本控制
#   FIX#4: FIND_PROCESS_MODE off → OpenWrt 路由器不需要进程匹配

[General]
CORE_TYPE = Smart
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 0
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 0
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 0
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 1
CUSTOM_NAME_POLICY = 0
CUSTOM_HOST = 0
CUSTOM_FALLBACK_FILTER = 0
IPV6_ENABLE = 0
IPV6_DNS = 0
EN_MODE = fake-ip
ENABLE_UDP_PROXY = 1
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule
STACK_TYPE = mixed
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
COMMON_PORTS = 0
# ★ FIX#1: 改为 0。覆写脚本已有完整的中国分流规则（GEOIP,CN + RULE-SET,cn + cn-ip 
#   + acc-chinamax + acc-china + acc-geositecn + acc-geo-d/ip-asia-china），
#   CHINA_IP_ROUTE=1 会导致 OpenClash Step3 额外注入 geosite 引用，
#   在 geodata 模式下产生 "list geosite not found" 解析错误。
CHINA_IP_ROUTE = 0
CHINA_IP6_ROUTE = 0
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = *
CHNR_UPDATE_DAY_TIME = 6
ENABLE_META_SNIFFER = 1
ENABLE_META_SNIFFER_CUSTOM = 0
ENABLE_META_SNIFFER_PURE_IP = 0
ENABLE_TCP_CONCURRENT = 1
FIND_PROCESS_MODE = off
ENABLE_UNIFIED_DELAY = 1
ENABLE_RULE_PROXY = 0
ENABLE_CUSTOM_CLASH_RULES = 0
AUTO_SMART_SWITCH = 1
SMART_ENABLE_LGBM = 1
LGBM_AUTO_UPDATE = 1
LGBM_UPDATE_INTERVAL = 72
LGBM_CUSTOM_URL = https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
ENABLE_GEOIP_DAT = 1
GEODATA_LOADER = standard
GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = *
GEO_UPDATE_DAY_TIME = 5
GEO_CUSTOM_URL = https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb
GEOIP_AUTO_UPDATE = 1
GEOIP_UPDATE_WEEK_TIME = *
GEOIP_UPDATE_DAY_TIME = 5
GEOIP_CUSTOM_URL = https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat
# ★ FIX#2: 添加 GeoSite 自动更新配置，确保 geosite.dat 来源与覆写脚本一致
GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = *
GEOSITE_UPDATE_DAY_TIME = 5
GEOSITE_CUSTOM_URL = https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
GEOASN_AUTO_UPDATE = 1
GEOASN_UPDATE_WEEK_TIME = *
GEOASN_UPDATE_DAY_TIME = 5
GEOASN_CUSTOM_URL = https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb
SMALL_FLASH_MEMORY = 0
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 0
SKIP_PROXY_ADDRESS = 1
RESTART = true
