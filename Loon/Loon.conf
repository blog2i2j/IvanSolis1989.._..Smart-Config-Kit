[Rule]
# ─── 阶段 1: 广告拦截与威胁情报 ───────────────────────────────────────────────
# anti-AD（privacy-protection-tools/anti-AD 官方源；anti-ad.net 无 CDN 且部分 ISP 会劫持返回 HTML，Loon 会当规则解析报语法错）
# SukkaW 钓鱼域名拦截（13 万条；Loon 用 non_ip .conf，domainset 是 Surge 专属二级格式）
# Hagezi TIF（威胁情报：malware/cryptojacking/C2/scam/spam）
# blackmatrix7 广告/隐私/营销追踪规则集（SR 原生）

# ─── 阶段 2: 私有网段与本地服务 ───────────────────────────────────────────────
# 私有 IP（Surge 格式，SR 兼容）
# 常用 LAN 段兜底
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
# Loon 只认 IP-CIDR（自动识别 IPv4 / IPv6），无 IP-CIDR6 变体
IP-CIDR,::1/128,DIRECT,no-resolve
IP-CIDR,fc00::/7,DIRECT,no-resolve
IP-CIDR,fe80::/10,DIRECT,no-resolve

# 原版业务 IP 直连（Windows Delivery Optimization 屏蔽 + IP 检测域名）
# v5.2.10-Loon.2 FIX#40：Loon 端口规则名是 DEST-PORT 而非 DST-PORT（官方 nsloon.app/docs/Rule/port_rule/）
DEST-PORT,7680,REJECT
DOMAIN,ip.cip.cc,DIRECT
# 原版 PROCESS-NAME/DST-PORT 业务规则 → iOS 无法识别进程，保留端口规则
DEST-PORT,123,DIRECT
DEST-PORT,3478,DIRECT
