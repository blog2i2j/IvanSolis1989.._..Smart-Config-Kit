name: AI Issue Auto-Responder (DeepSeek)

# ═══════════════════════════════════════════════════════════════════════════
# Smart-Config-Kit — AI Issue 自动回复器
# ───────────────────────────────────────────────────────────────────────────
# 触发方式（二选一）：
#   1. Issue 被打上（或创建时自带）任一标签：
#        question / faq / help wanted / bug / enhancement / documentation
#      —— 对应 .github/ISSUE_TEMPLATE 里 4 个模板各自的 labels 字段
#   2. 任何人在 issue 评论区写 "/ai-help"
#
# AI 的角色边界：
#   • 对所有类型 issue 都先给"初步分析"（包括 bug：先帮用户判断是不是 bug）
#   • 但 AI 没有代码修改 / 合并 PR / 打 label / 关闭 issue 的权限
#   • 所以所有回复末尾都会强调"等维护者人工处理"
#
# 安全护栏：
#   • permissions 只给 issues:write + contents:read（看不了 PR、改不了代码）
#   • system prompt 明确要求：bug 根因分析 / 架构 / 安全漏洞 → 转人工，
#     绝对不能提议改代码
#   • timeout 5 分钟硬上限防止超支
#
# 分层调用策略（v3 — DeepSeek V4 API）：
#   首轮（issues opened/labeled） → deepseek-v4-flash 非思考模式  快速 / 便宜 / 覆盖 80% 常见问题
#   追问（issue_comment /ai-help）→ deepseek-v4-flash 思考模式    思维链 / 深度分析 / 适合复杂排障
#   理由：首次提问大多是"导入 / 语法 / FAQ"类，非思考模式足够；用户看完首轮还在
#        追问，说明问题复杂需要深度推理，这时才升级思考模式值回票价。
#   注：deepseek-chat / deepseek-reasoner 两个旧模型名 V4 起将弃用，官方映射到
#       deepseek-v4-flash 的非思考 / 思考模式（价格一致，无需切 v4-pro）。
#
# 成本估算（V4 定价：flash 1 元/M 输入 + 2 元/M 输出，缓存命中 0.2 元/M 输入）：
#   • 首轮非思考 ≈ 0.02 元/次；追问思考 ≈ 0.03 元/次（多出 reasoning tokens 计入输出）
#   • 典型场景：100 issues/月 + 20% 追问率 → ≈ 2 元 + 0.6 元 ≈ 3 元/月（不到 $0.5）
#   • GitHub Actions：public repo 无限免费
#
# 需要配置的 secret：
#   Settings → Secrets and variables → Actions → New repository secret
#     Name:  DEEPSEEK_API_KEY
#     Value: https://platform.deepseek.com/api_keys 生成
# ═══════════════════════════════════════════════════════════════════════════

on:
  issues:
    # 只监听 labeled，不监听 opened——否则用模板建 issue 会触发两次：
    #   ① issues.opened 事件（此时 issue 已带着模板自动打的标签）
    #   ② issues.labeled 事件（模板标签被应用时）
    # 两次都会过 if: 白名单 → 两次 AI 回复 → 双倍费用 + 用户体验差。
    # labeled 单监听 + 检查 github.event.label.name 就能覆盖所有场景：
    #   - 用模板创建 issue（模板自动打标签）→ labeled 触发一次 ✅
    #   - 裸 issue 后手工打标签 → labeled 触发一次 ✅
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write        # 可写 issue 评论
  contents: read       # 可读仓库文件（喂给 AI 做上下文），不能改
  pull-requests: read  # 不能创建 PR

# 并发组：同一 issue 的多次触发排队执行（不并行），避免用户连续改标签导致多条 AI 回复
concurrency:
  group: ai-responder-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  respond:
    # 低风险触发门槛：**本次刚打上的** label 命中白名单，或评论里显式 /ai-help
    # 关键修复：用 github.event.label.name（本次打的那个），而不是 github.event.issue.labels.*.name
    # （所有 label 集合）——否则 issue 已有 question 再打 wontfix 会再触发一次 AI 回复。
    # 对应 4 个 issue 模板：question / bug / enhancement / documentation
    # 额外兼容维护者手打的 faq / help wanted
    if: |
      (github.event_name == 'issues' && (
        github.event.label.name == 'question' ||
        github.event.label.name == 'faq' ||
        github.event.label.name == 'help wanted' ||
        github.event.label.name == 'bug' ||
        github.event.label.name == 'enhancement' ||
        github.event.label.name == 'documentation'
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ai-help'))

    runs-on: ubuntu-latest
    timeout-minutes: 8   # 思考模式 + curl 240s 上限，留足余量避免误杀

    steps:
      - name: Checkout repo (read-only usage)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build AI context from repo docs
        run: |
          # 把最关键的文档喂给 AI 作为上下文。DeepSeek V4 context 1M，绰绰有余。
          # 想追加更多文档，在这里 cat 进去即可。
          {
            echo "===== CLAUDE.md（仓库维护契约）====="
            head -150 CLAUDE.md 2>/dev/null || echo "(CLAUDE.md not found)"
            echo
            echo "===== AGENTS.md（代理协作契约）====="
            head -80 AGENTS.md 2>/dev/null || echo "(AGENTS.md not found)"
            echo
            echo "===== 根 README.md 节选（前 150 行）====="
            head -150 README.md 2>/dev/null || echo "(README.md not found)"
          } > /tmp/context.txt
          # 不再走 GITHUB_OUTPUT 回传 + jq -Rs 编码——下一步直接 jq --rawfile 读 /tmp/context.txt，
          # 既绕开了 GitHub Actions 模板替换破坏 JSON 引号的坑，又少 30 行代码。
          echo "✅ context built: $(wc -l < /tmp/context.txt) lines, $(wc -c < /tmp/context.txt) bytes"

      - name: Call DeepSeek API
        id: llm
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 全部走 env 把不可信用户输入隔离到环境变量，bash 不会再次解释——
          # 如果把 GitHub Actions 表达式直接拼到 run: 里，会在 YAML 阶段做纯文本替换，
          # 留下引号注入风险（评论含 " 或反引号就炸）。
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}    # issues 事件下为空字符串，安全
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "⚠️  DEEPSEEK_API_KEY secret 未配置，跳过 AI 调用" >&2
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── 分层模型选择（DeepSeek V4 API）────────────────────────
          # 统一用 deepseek-v4-flash，通过 thinking 开关切换非思考 / 思考模式：
          # issues 事件 = 首次触发 → flash 非思考模式（等价旧 deepseek-chat）
          # issue_comment 事件 = 用户 /ai-help 追问 → flash 思考模式（等价旧 deepseek-reasoner）
          MODEL="deepseek-v4-flash"
          if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
            THINKING_TYPE="enabled"
            CURL_TIMEOUT=240        # 思考模式 30–90s，给足余量
            TIER_MARK="FOLLOWUP"    # 在 user 消息里打标签给 AI
            TIER_LABEL="追问 · 深度分析"
          else
            THINKING_TYPE="disabled"
            CURL_TIMEOUT=60         # 非思考模式典型 2–5s，60s 足够
            TIER_MARK="FIRST"
            TIER_LABEL="首轮 · 快速回复"
          fi
          echo "🎯 Tier: ${TIER_LABEL} / Model: ${MODEL} / Thinking: ${THINKING_TYPE}"
          echo "model=${MODEL}"           >> "$GITHUB_OUTPUT"
          echo "tier_label=${TIER_LABEL}" >> "$GITHUB_OUTPUT"

          SYSTEM_PROMPT=$(cat <<'PROMPT'
          你是 Smart-Config-Kit（科学上网分流配置仓库）的 issue 初筛助手。

          【仓库定位】
          以 Clash Party JS 覆写脚本为基线，同步产出 10 份客户端等价配置：
          CMFA YAML / OpenClash Normal+Smart / Shadowrocket / SingBox Full /
          Surge / Loon / Quantumult X / v2rayN / Passwall2。
          架构核心：28 业务组 × 9 区域组 + 多源 rule-providers + LightGBM 智能选路。

          【你的角色】
          维护者人工处理前的**初步分析**层。4 种 issue 类型都会路由到你：

          1. ❓ question（使用问题）
             → 正面回答：配置导入 / 语法 / 安装步骤 / FAQ / 规则解释 / 协议兼容性 /
               DNS / 平台差异。有把握就直接给答案。

          2. 🐛 bug（用户报告的疑似 bug）
             → 先判断"到底是不是 bug"：对照 CLAUDE.md 的设计约束、README 使用说明、
               对应子目录 CHANGELOG.md、其他客户端同组产物的行为，四类结论：
               A. 明显不是 bug（用户理解偏差 / 配置没按 README 走 / 依赖版本不够）
                  → 礼貌指出实际行为是设计如此，引用文档路径
               B. 可能是 bug，有已知线索 → 说出可能的根因方向（例如 rule-provider
                  URL 变更、某字段在新版内核 deprecated、跨产物不一致）供维护者验证
               C. 可能是 bug 但信息不足 → 列出还需要用户补充的信息
               D. 明显是 bug → 确认现象，等维护者修
               **不要**给具体代码修改 diff，只说"可能在哪一层 / 哪个文件附近"。

          3. ✨ enhancement（功能/规则建议）
             → 对照 README "🎯 差异化价值" 的 4 类加法原则做初步可行性评估：
                ① 新兴服务（geosite 未收录） / ② 拆 geosite 总类 /
                ③ 广告多源互补 / ④ 地区长尾 ASN
               如果建议和 geosite 某分类 > 95% 重叠 → 指出"可能被拒绝"并解释原因。
               如果落在 4 类之一 → 给出肯定评估，但强调最终采纳权在维护者。

          4. 📝 documentation（文档反馈）
             → 定位对应文件（根 README.md / CLAUDE.md / AGENTS.md / 各子目录 README.md
               或 CHANGELOG.md），判断描述与现状是否一致：
                - 确实过时 / 错字 / 链接 404 → 说明哪里错、应该是什么
                - 描述其实正确但用户读懂有歧义 → 解释正确含义

          5. 💬 /ai-help 评论召唤 → 针对评论上下文答，不要重复整个 issue 分析

          【引用文档】
          精确路径，别泛指："CLAUDE.md" / "AGENTS.md" /
          "Clash Party/Clash Smart内核覆写脚本.js" / "OpenClash/CHANGELOG.md" /
          "SingBox/README.md §2a" 之类。

          【硬规则 — 必须遵守】
          - ❌ **永远不要给具体代码修改 / diff / patch**——就算你已判断出根因，
             也只说"可能在哪一层"，不提"把 X 改成 Y"。代码决策 100% 留给维护者。
          - ❌ 不承诺 "下个版本会加 / 会被采纳 / 会修"——你没有任何决策权。
          - ❌ 安全漏洞 → 只提醒 "请用 GitHub Security Advisory 私下报告，不要公开"；
             不讨论利用细节。
          - ❌ 不确定的事直接说"不确定，等维护者确认"，不要编造文档路径或字段名。
          - ❌ 不推荐具体机场 / VPN 服务商 / 付费订阅。
          - ❌ 不泄露或讨论 API key / secrets / CI 配置细节。
          - ❌ 不说"你好我是 AI"这种套话；中文回复，直奔主题。

          【调用分层 — 用户消息会带标签】
          用户消息顶部会出现 `[TIER: FIRST]` 或 `[TIER: FOLLOWUP]`：
          - `FIRST`  → 首次触发（issue 刚打标签），你用 deepseek-v4-flash 非思考模式速度优先
             → 第一行用「🤖 AI 初步分析（<类型>）」
          - `FOLLOWUP` → 用户看过首轮后 `/ai-help` 追问，你用 deepseek-v4-flash 思考模式深度推理
             → 第一行用「🤖 AI 深度分析（<类型> · 追问）」，并**正面回应评论里的追问焦点**，
               别重复首轮讲过的内容

          【回复结构】
          - **第一行**按上面分层规则写类型标签（使用问题 / 疑似 bug → 需维护者确认 /
            功能建议 → 4 类加法原则评估 / 文档反馈）
          - 中间：分析内容（短问题 1-3 段；复杂问题用小标题 / 表格 / 代码块）
          - **倒数第二段**必须包含这句硬提示（原文复制，不要改措辞）：
             > ⚠️ **我只做初步分析，没有代码修改 / PR 合并 / 关闭 issue 的权限**。
             > 以上分析仅供参考，**最终修复 / 采纳 / 关闭请等维护者人工处理**。
          - 末尾**不要**再自己签名——workflow 会自动补 Model / Workflow 元信息。
          PROMPT
          )

          # 拼 body JSON
          # 关键设计：所有用户输入（标题/正文/评论/上下文）都通过 jq 的 --arg / --rawfile 传入，
          # 由 jq 自己负责 JSON 转义。绝对不在 bash 里手工拼 JSON 字符串。
          #
          # 注意（DeepSeek V4）：thinking={type:"enabled"} 时模型会先输出思维链
          # （reasoning_content 字段），再输出最终答案（content 字段）。
          #   - 我们只取 content（下方 jq '.choices[0].message.content'），不暴露推理过程给用户。
          #   - 思考模式忽略 temperature 参数（官方说明）；非思考模式不单独调 temperature 走默认。
          #   - max_tokens 控制"最终答案"上限，不含推理 token。
          #   - thinking 参数按 V4 官方格式：{"type": "enabled" | "disabled"}。
          REQ_BODY=$(jq -n \
            --arg model    "$MODEL" \
            --arg sys      "$SYSTEM_PROMPT" \
            --arg tier     "$TIER_MARK" \
            --arg title    "$ISSUE_TITLE" \
            --arg body     "$ISSUE_BODY" \
            --arg comment  "$COMMENT_BODY" \
            --arg thinking "$THINKING_TYPE" \
            --rawfile ctx /tmp/context.txt \
            '{
              model: $model,
              messages: [
                { role: "system", content: $sys },
                { role: "user",   content: (
                    "[TIER: " + $tier + "]\n\n"
                  + "# 仓库文档上下文\n\n" + $ctx
                  + "\n\n---\n\n# Issue 内容\n\n## 标题\n" + $title + "\n\n## 正文\n" + $body
                  + ( if $comment != "" then "\n\n---\n\n# 用户追问评论\n\n" + $comment else "" end )
                ) }
              ],
              thinking: { type: $thinking },
              max_tokens: 1500,
              stream: false
            }')

          # DeepSeek 的 API endpoint，兼容 OpenAI ChatCompletion 格式
          # CURL_TIMEOUT 根据模式动态：非思考 60s / 思考 240s
          RESPONSE=$(curl -s --max-time "$CURL_TIMEOUT" https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQ_BODY")

          # 抽 choices[0].message.content；失败时给 fallback
          REPLY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$REPLY" ]; then
            ERR=$(echo "$RESPONSE" | jq -r '.error.message // "未知错误"')
            REPLY="⚠️ AI 调用失败：${ERR}（请等维护者人工回复）"
          fi

          # 写回 GITHUB_OUTPUT（heredoc 格式，允许多行）
          {
            echo "reply<<REPLYEOF"
            echo "$REPLY"
            echo "REPLYEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post reply to issue
        if: steps.llm.outputs.skipped != 'true'
        uses: actions/github-script@v7
        env:
          # 走 env 而不是直接把 GitHub Actions 表达式拼到 script 里——AI 回复必含反引号
          # （markdown 代码块），直接拼进 JS 模板字符串会破坏语法。env 走 process.env 安全。
          AI_REPLY: ${{ steps.llm.outputs.reply }}
          AI_MODEL: ${{ steps.llm.outputs.model }}
          AI_TIER:  ${{ steps.llm.outputs.tier_label }}
        with:
          script: |
            const aiReply = process.env.AI_REPLY || '(AI 回复为空，请等维护者人工回复)';
            const model   = process.env.AI_MODEL || 'deepseek-v4-flash';
            const tier    = process.env.AI_TIER  || '首轮 · 快速回复';
            const commentBody = [
              `> 🤖 **AI 自动回复**（${tier}，仅供参考）`,
              '',
              aiReply,
              '',
              '---',
              `<sub>Model: \`${model}\` · Tier: ${tier}（首轮非思考 / 追问思考模式 分层）· Workflow: \`.github/workflows/ai-responder.yml\` · 想要更深度分析请在评论里 \`/ai-help\` · AI 无代码修改权限，最终处理请等维护者 @ivansolis1989</sub>`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

      - name: Notify missing secret
        if: steps.llm.outputs.skipped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = [
              '> ⚠️ AI 助手未就绪',
              '',
              '仓库维护者需要先在 Settings → Secrets and variables → Actions 里配置 `DEEPSEEK_API_KEY`，此 issue 将等人工回复。',
              '',
              '<sub>Workflow: `.github/workflows/ai-responder.yml`</sub>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
