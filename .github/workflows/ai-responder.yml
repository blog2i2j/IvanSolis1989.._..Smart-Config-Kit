name: AI Issue Auto-Responder (DeepSeek)

# ═══════════════════════════════════════════════════════════════════════════
# Smart-Config-Kit — AI Issue 自动回复器
# ───────────────────────────────────────────────────────────────────────────
# 触发方式（二选一）：
#   1. Issue 被打上（或创建时自带）任一标签：
#        question / faq / help wanted / bug / enhancement / documentation
#      —— 对应 .github/ISSUE_TEMPLATE 里 4 个模板各自的 labels 字段
#   2. 任何人在 issue 评论区写 "/ai-help"
#
# 分层调用策略（v4 — DeepSeek V4 双模型 + 代码修改权限）：
#   ┌──────────────────────┬───────────────┬──────────┬──────────┬──────────┐
#   │ Issue 类别            │ 触发场景       │ 模型     │ Thinking │ 代码修改 │
#   ├──────────────────────┼───────────────┼──────────┼──────────┼──────────┤
#   │ question/faq/        │ 首次（labeled）│ v4-flash │ enabled  │ ❌       │
#   │   help wanted        │ 第1次+ /ai-help│ v4-pro   │ enabled  │ ❌       │
#   ├──────────────────────┼───────────────┼──────────┼──────────┼──────────┤
#   │ bug                  │ 首次（labeled）│ v4-flash │ enabled  │ ✅       │
#   │                      │ /ai-help 追问  │ v4-pro   │ enabled  │ ✅       │
#   ├──────────────────────┼───────────────┼──────────┼──────────┼──────────┤
#   │ enhancement          │ 首次（labeled）│ v4-flash │ enabled  │ ✅       │
#   │                      │ /ai-help 追问  │ v4-pro   │ enabled  │ ✅       │
#   ├──────────────────────┼───────────────┼──────────┼──────────┼──────────┤
#   │ documentation        │ 首次（labeled）│ v4-flash │ enabled  │ ✅ (文档) │
#   │                      │ /ai-help 追问  │ v4-flash │ enabled  │ ✅ (文档) │
#   └──────────────────────┴───────────────┴──────────┴──────────┴──────────┘
#
#   代码修改模式：AI 输出结构化响应（<!-- AI_REPLY --> + <!-- AI_PATCH --> +
#   <!-- AI_PR -->），workflow 自动提取补丁、创建分支、提交并开 PR。
#   不按格式输出 → fallback 只发评论，不创建 PR。
#
# 安全护栏：
#   • permissions 给 issues:write + contents:write + pull-requests:write
#   • system prompt 区分「只分析」和「可改代码」两种模式
#   • 不改代码的模式下仍禁止 diff/patch
#   • timeout 15 分钟硬上限
#
# 需要配置的 secret：
#   Settings → Secrets and variables → Actions → New repository secret
#     Name:  DEEPSEEK_API_KEY
#     Value: https://platform.deepseek.com/api_keys 生成
# ═══════════════════════════════════════════════════════════════════════════

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: ai-responder-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  respond:
    if: |
      (github.event_name == 'issues' && (
        github.event.label.name == 'question' ||
        github.event.label.name == 'faq' ||
        github.event.label.name == 'help wanted' ||
        github.event.label.name == 'bug' ||
        github.event.label.name == 'enhancement' ||
        github.event.label.name == 'documentation'
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ai-help'))

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build AI context
        run: |
          {
            echo "===== CLAUDE.md（仓库维护契约）====="
            head -150 CLAUDE.md 2>/dev/null || echo "(CLAUDE.md not found)"
            echo
            echo "===== AGENTS.md（代理协作契约）====="
            head -80 AGENTS.md 2>/dev/null || echo "(AGENTS.md not found)"
            echo
            echo "===== 根 README.md 节选（前 150 行）====="
            head -150 README.md 2>/dev/null || echo "(README.md not found)"
          } > /tmp/context.txt
          echo "✅ context built: $(wc -l < /tmp/context.txt) lines, $(wc -c < /tmp/context.txt) bytes"

      # ── 步骤 1：判定 issue 类别 + 选择模型 / thinking / 代码修改权限 ─
      - name: Determine category & model
        id: tier
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REPO: ${{ github.repository }}
        run: |
          # ── 1. 判定 issue 类别 ─────────────────────────────────
          if [ "$GITHUB_EVENT_NAME" = "issues" ]; then
            CATEGORY="$LABEL_NAME"
            # 把 faq / help wanted 归入 question 类
            case "$CATEGORY" in
              faq|"help wanted") CATEGORY="question" ;;
            esac
          else
            # issue_comment 事件：查 issue 的 labels
            ISSUE_LABELS=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$ISSUE_LABELS" | grep -qx 'bug'; then
              CATEGORY="bug"
            elif echo "$ISSUE_LABELS" | grep -qx 'enhancement'; then
              CATEGORY="enhancement"
            elif echo "$ISSUE_LABELS" | grep -qx 'documentation'; then
              CATEGORY="documentation"
            else
              CATEGORY="question"  # question / faq / help wanted / 无标签默认
            fi
          fi

          # ── 2. 计数 /ai-help 次数 ─────────────────────────────
          AI_HELP_COUNT=0
          if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
            AI_HELP_COUNT=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
              --jq '[.[] | select(.body | contains("/ai-help"))] | length' 2>/dev/null || echo "1")
          fi

          # ── 3. 查表决策 ──────────────────────────────────────
          case "$CATEGORY" in
            question)
              if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                MODEL="deepseek-v4-pro"
                TIER_MARK="FOLLOWUP"
                TIER_LABEL="问题追问（v4-pro 思考 · 只分析）"
              else
                MODEL="deepseek-v4-flash"
                TIER_MARK="FIRST"
                TIER_LABEL="问题/求助（首轮 · v4-flash 思考 · 只分析）"
              fi
              THINKING_TYPE="enabled"
              CODE_MOD="false"
              ;;
            bug)
              if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                MODEL="deepseek-v4-pro"
                TIER_MARK="FOLLOWUP"
                TIER_LABEL="Bug 追问（v4-pro 思考 · 可改代码）"
              else
                MODEL="deepseek-v4-flash"
                TIER_MARK="FIRST"
                TIER_LABEL="Bug 分析（首轮 · v4-flash 思考 · 可改代码）"
              fi
              THINKING_TYPE="enabled"
              CODE_MOD="true"
              ;;
            enhancement)
              if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                MODEL="deepseek-v4-pro"
                TIER_MARK="FOLLOWUP"
                TIER_LABEL="功能建议追问（v4-pro 思考 · 可改代码）"
              else
                MODEL="deepseek-v4-flash"
                TIER_MARK="FIRST"
                TIER_LABEL="功能建议（首轮 · v4-flash 思考 · 可改代码）"
              fi
              THINKING_TYPE="enabled"
              CODE_MOD="true"
              ;;
            documentation)
              MODEL="deepseek-v4-flash"
              THINKING_TYPE="enabled"
              CODE_MOD="true"
              if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                TIER_MARK="FOLLOWUP"
                TIER_LABEL="文档追问（v4-flash 思考 · 可改文档）"
              else
                TIER_MARK="FIRST"
                TIER_LABEL="文档反馈（首轮 · v4-flash 思考 · 可改文档）"
              fi
              ;;
          esac

          CURL_TIMEOUT=240  # 思考模式统一 240s；非思考 60s
          if [ "$THINKING_TYPE" = "disabled" ]; then
            CURL_TIMEOUT=60
          fi

          echo "🎯 Category: ${CATEGORY} / Tier: ${TIER_LABEL} / Model: ${MODEL} / Thinking: ${THINKING_TYPE} / CodeMod: ${CODE_MOD}"
          echo "category=${CATEGORY}"           >> "$GITHUB_OUTPUT"
          echo "model=${MODEL}"                 >> "$GITHUB_OUTPUT"
          echo "thinking=${THINKING_TYPE}"      >> "$GITHUB_OUTPUT"
          echo "code_mod=${CODE_MOD}"           >> "$GITHUB_OUTPUT"
          echo "tier_mark=${TIER_MARK}"         >> "$GITHUB_OUTPUT"
          echo "tier_label=${TIER_LABEL}"       >> "$GITHUB_OUTPUT"
          echo "curl_timeout=${CURL_TIMEOUT}"   >> "$GITHUB_OUTPUT"
          echo "ai_help_count=${AI_HELP_COUNT}" >> "$GITHUB_OUTPUT"

      # ── 步骤 2：调用 DeepSeek API ────────────────────────────
      - name: Call DeepSeek API
        id: llm
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          MODEL: ${{ steps.tier.outputs.model }}
          THINKING: ${{ steps.tier.outputs.thinking }}
          CODE_MOD: ${{ steps.tier.outputs.code_mod }}
          TIER_MARK: ${{ steps.tier.outputs.tier_mark }}
          CURL_TIMEOUT: ${{ steps.tier.outputs.curl_timeout }}
          CATEGORY: ${{ steps.tier.outputs.category }}
          AI_HELP_COUNT: ${{ steps.tier.outputs.ai_help_count }}
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "⚠️  DEEPSEEK_API_KEY secret 未配置，跳过 AI 调用" >&2
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🎯 Model: ${MODEL} / Thinking: ${THINKING} / CodeMod: ${CODE_MOD} / Timeout: ${CURL_TIMEOUT}s"

          # ── 构建 system prompt ────────────────────────────────
          SYSTEM_PROMPT=$(cat <<'PROMPT_BASE'
          你是 Smart-Config-Kit（科学上网分流配置仓库）的 issue 初筛助手。

          【仓库定位】
          以 Clash Party JS 覆写脚本为基线，同步产出 10 份客户端等价配置：
          CMFA YAML / OpenClash Normal+Smart / Shadowrocket / SingBox Full /
          Surge / Loon / Quantumult X / v2rayN / Passwall2。
          架构核心：28 业务组 × 9 区域组 + 多源 rule-providers + LightGBM 智能选路。
          仓库维护契约见 CLAUDE.md（每次改动必须全版本联动）。

          【你的角色】
          维护者人工处理前的**初步分析**层。4 种 issue 类型都会路由到你：

          1. ❓ question（使用问题）
             → 正面回答：配置导入 / 语法 / 安装步骤 / FAQ / 规则解释 / 协议兼容性 /
               DNS / 平台差异。有把握就直接给答案。

          2. 🐛 bug（用户报告的疑似 bug）
             → 先判断"到底是不是 bug"：对照 CLAUDE.md 的设计约束、README 使用说明、
               对应子目录 CHANGELOG.md、其他客户端同组产物的行为，四类结论：
               A. 明显不是 bug（用户理解偏差 / 配置没按 README 走 / 依赖版本不够）
                  → 礼貌指出实际行为是设计如此，引用文档路径
               B. 可能是 bug，有已知线索 → 说出可能的根因方向（例如 rule-provider
                  URL 变更、某字段在新版内核 deprecated、跨产物不一致）供维护者验证
               C. 可能是 bug 但信息不足 → 列出还需要用户补充的信息
               D. 明显是 bug → 确认现象，定位到具体文件/行号，**给出代码修改**（见下方代码修改模式）。

          3. ✨ enhancement（功能/规则建议）
             → 对照 README "🎯 差异化价值" 的 4 类加法原则做初步可行性评估：
                ① 新兴服务（geosite 未收录） / ② 拆 geosite 总类 /
                ③ 广告多源互补 / ④ 地区长尾 ASN
               如果建议和 geosite 某分类 > 95% 重叠 → 指出"可能被拒绝"并解释原因。
               如果落在 4 类之一 → 给出肯定评估，**可直接实现**（见下方代码修改模式）。

          4. 📝 documentation（文档反馈）
             → 定位对应文件（根 README.md / CLAUDE.md / AGENTS.md / 各子目录 README.md
               或 CHANGELOG.md），判断描述与现状是否一致：
                - 确实过时 / 错字 / 链接 404 → 说明哪里错、应该是什么，**直接修改**
                - 描述其实正确但用户读懂有歧义 → 解释正确含义

          5. 💬 /ai-help 评论召唤 → 针对评论上下文答，不要重复整个 issue 分析

          【引用文档】
          精确路径，别泛指："CLAUDE.md" / "AGENTS.md" /
          "Clash Party/ClashParty(mihomo-smart).js" / "OpenClash/CHANGELOG.md" /
          "SingBox/README.md §2a" 之类。

          【硬规则 — 必须遵守】
          - ❌ 不承诺 "下个版本会加 / 会被采纳 / 会修"——你没有任何决策权。
          - ❌ 安全漏洞 → 只提醒 "请用 GitHub Security Advisory 私下报告，不要公开"；
             不讨论利用细节。
          - ❌ 不确定的事直接说"不确定，等维护者确认"，不要编造文档路径或字段名。
          - ❌ 不推荐具体机场 / VPN 服务商 / 付费订阅。
          - ❌ 不泄露或讨论 API key / secrets / CI 配置细节。
          - ❌ 不说"你好我是 AI"这种套话；中文回复，直奔主题。

          【调用分层 — 用户消息会带标签】
          用户消息顶部会出现 `[TIER: FIRST]` 或 `[TIER: FOLLOWUP]`：
          - `FIRST`  → 首次触发（issue 刚打标签）
             → 第一行用「🤖 AI 初步分析（<类型>）」
          - `FOLLOWUP` → 用户 `/ai-help` 追问
             → 第一行用「🤖 AI 深度分析（<类型> · 追问）」，并**正面回应评论里的追问焦点**，
               别重复首轮讲过的内容
          PROMPT_BASE
          )

          # ── 代码修改模式追加指令 ──────────────────────────
          if [ "${CODE_MOD}" = "true" ]; then
            CODE_MOD_INSTR=$(cat <<'PROMPT_CODE_MOD'

          【代码修改模式 — 已激活】
          你有代码修改权限。当你判断需要修改代码时，按以下格式输出响应：

          <!-- AI_REPLY -->
          （你的文本回复——分析、解释、方案说明。和普通回复一样，中文 markdown。）
          <!-- /AI_REPLY -->

          <!-- AI_PATCH:relative/path/to/file.ext -->
          （文件的完整新内容——不是 diff，是整个文件重写后的内容）
          <!-- /AI_PATCH -->

          （可重复多个 AI_PATCH 块，每个文件一个块）

          <!-- AI_PR -->
          （PR 标题，一行，简短）
          |
          （PR 正文，可以多行，markdown 格式。说明改动内容、原因、影响面。）
          <!-- /AI_PR -->

          **重要规则：**
          - 如果你判断**不需要修改代码**（例如 bug 其实不是 bug、功能建议不可行），
            **只输出 <!-- AI_REPLY --> 块**，不要输出 AI_PATCH 和 AI_PR 块。
          - **只有在你确认需要改代码时才输出完整的三段结构。**
          - AI_PATCH 里的路径必须是仓库内真实路径，内容必须是完整的文件内容（不是 diff）。
          - 修 bug / 加功能时，**必须遵循 CLAUDE.md §1 全版本联动规则**——
            先改 Clash Party JS 基线，再同步所有受影响的产物文件。
            **所有需要改动的文件都要各自一个 AI_PATCH 块。**
          - 修文档时只改对应的 README.md / CHANGELOG.md。
          - AI_PR 标题和正文用中文，PR 正文列出影响面和每个修改的文件。
          - 文本回复（AI_REPLY）里**不要**重复贴代码块——代码修改全部放到 AI_PATCH 里，
            workflow 会自动提取并创建 PR。回复里只需说明分析结论 + 引用 PR 链接占位符。
          PROMPT_CODE_MOD
          )
            SYSTEM_PROMPT="${SYSTEM_PROMPT}${CODE_MOD_INSTR}"
          fi

          # ── 无代码修改模式追加指令 ──────────────────────────
          if [ "${CODE_MOD}" != "true" ]; then
            NO_CODE_INSTR=$(cat <<'PROMPT_NO_CODE'

          【无代码修改权限】
          - ❌ **不要给具体代码修改 / diff / patch**——就算你已判断出根因，
             也只说"可能在哪一层"，不提"把 X 改成 Y"。代码决策 100% 留给维护者。
          - 回复里不要出现 AI_PATCH 或 AI_PR 标记。
          PROMPT_NO_CODE
          )
            SYSTEM_PROMPT="${SYSTEM_PROMPT}${NO_CODE_INSTR}"
          fi

          # ── 回复结构（按代码修改权限区分）─────────────────
          if [ "${CODE_MOD}" = "true" ]; then
            REPLY_STRUCTURE=$(cat <<'PROMPT_STRUCTURE_CODE'

          【回复结构】
          - **第一行**按分层规则写类型标签（使用问题 / 疑似 bug → 需维护者确认 /
            功能建议 → 4 类加法原则评估 / 文档反馈）
          - 中间：分析内容（短问题 1-3 段；复杂问题用小标题 / 表格 / 代码块）
          - **倒数第二段**必须包含这句硬提示（原文复制，不要改措辞）：
             > ⚠️ **我有代码分析和 PR 创建权限，但最终合并 / 采纳决定权在维护者**。
             > 以上分析和代码修改仅供参考，**最终合并 / 关闭请等维护者人工处理**。
          - 末尾**不要**再自己签名——workflow 会自动补 Model / Workflow / PR 链接元信息。
          PROMPT_STRUCTURE_CODE
          )
          else
            REPLY_STRUCTURE=$(cat <<'PROMPT_STRUCTURE_NOCODE'

          【回复结构】
          - **第一行**按分层规则写类型标签（使用问题 / 疑似 bug → 需维护者确认 /
            功能建议 → 4 类加法原则评估 / 文档反馈）
          - 中间：分析内容（短问题 1-3 段；复杂问题用小标题 / 表格 / 代码块）
          - **倒数第二段**必须包含这句硬提示（原文复制，不要改措辞）：
             > ⚠️ **我只做初步分析，没有代码修改 / PR 合并 / 关闭 issue 的权限**。
             > 以上分析仅供参考，**最终修复 / 采纳 / 关闭请等维护者人工处理**。
          - 末尾**不要**再自己签名——workflow 会自动补 Model / Workflow 元信息。
          PROMPT_STRUCTURE_NOCODE
          )
          fi
          SYSTEM_PROMPT="${SYSTEM_PROMPT}${REPLY_STRUCTURE}"

          # ── 拼 API 请求 JSON ─────────────────────────────────
          REQ_BODY=$(jq -n \
            --arg model   "$MODEL" \
            --arg sys     "$SYSTEM_PROMPT" \
            --arg tier    "$TIER_MARK" \
            --arg title   "$ISSUE_TITLE" \
            --arg body    "$ISSUE_BODY" \
            --arg comment "$COMMENT_BODY" \
            --arg thinking "$THINKING" \
            --rawfile ctx /tmp/context.txt \
            '{
              model: $model,
              messages: [
                { role: "system", content: $sys },
                { role: "user",   content: (
                    "[TIER: " + $tier + "]\n\n"
                  + "# 仓库文档上下文\n\n" + $ctx
                  + "\n\n---\n\n# Issue 内容\n\n## 标题\n" + $title + "\n\n## 正文\n" + $body
                  + ( if $comment != "" then "\n\n---\n\n# 用户追问评论\n\n" + $comment else "" end )
                ) }
              ],
              thinking: { type: $thinking },
              max_tokens: (if $thinking == "enabled" then 4096 else 1500 end),
              stream: false
            }')

          RESPONSE=$(curl -s --max-time "$CURL_TIMEOUT" https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQ_BODY")

          RAW_REPLY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$RAW_REPLY" ]; then
            ERR=$(echo "$RESPONSE" | jq -r '.error.message // "未知错误"')
            RAW_REPLY="⚠️ AI 调用失败：${ERR}（请等维护者人工回复）"
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

          # ── 提取 AI_REPLY 文本（去掉 AI_PATCH / AI_PR 标记）─
          # 先检测是否有 AI_REPLY 标记；如果有就只取标记内内容，否则全文当回复
          if echo "$RAW_REPLY" | grep -q '<!-- AI_REPLY -->'; then
            CLEAN_REPLY=$(echo "$RAW_REPLY" | sed -n '/<!-- AI_REPLY -->/,/<!-- \/AI_REPLY -->/p' | sed '1d;$d')
          else
            # 无标记 → 全文作为回复，清理可能残留的结构标记行
            CLEAN_REPLY=$(echo "$RAW_REPLY" | sed '/<!-- AI_PATCH:/,/<!-- \/AI_PATCH -->/d' | sed '/<!-- AI_PR -->/,/<!-- \/AI_PR -->/d')
          fi
          if [ -z "$CLEAN_REPLY" ]; then
            CLEAN_REPLY="$RAW_REPLY"
          fi

          # ── 检测是否有补丁 ─────────────────────────────────
          if echo "$RAW_REPLY" | grep -q '<!-- AI_PATCH:'; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

          # ── 写回 GITHUB_OUTPUT ──────────────────────────────
          {
            echo "reply<<REPLYEOF"
            echo "$CLEAN_REPLY"
            echo "REPLYEOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "raw_response<<RAWEOF"
            echo "$RAW_REPLY"
            echo "RAWEOF"
          } >> "$GITHUB_OUTPUT"

      # ── 步骤 3：提取代码修改 + 创建 PR ─────────────────────
      - name: Apply code changes & create PR
        id: pr
        if: steps.tier.outputs.code_mod == 'true' && steps.llm.outputs.has_patch == 'true'
        env:
          RAW_RESPONSE: ${{ steps.llm.outputs.raw_response }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔧 代码修改模式已激活，提取补丁..."

          # ── 配置 git 身份 ────────────────────────────────
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── 生成分支名 ────────────────────────────────────
          BRANCH="ai-fix/issue-${ISSUE_NUMBER}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"

          # ── 提取并应用 AI_PATCH 块 ────────────────────────
          # 格式：<!-- AI_PATCH:path/to/file --> ... <!-- /AI_PATCH -->
          PATCH_COUNT=0
          echo "$RAW_RESPONSE" > /tmp/ai_response.txt

          # 用 awk 提取每个 patch 块（兼容 mawk / gawk）
          awk '
            /<!-- AI_PATCH:/ {
              line = $0
              sub(/.*<!-- AI_PATCH:/, "", line)
              sub(/ -->.*/, "", line)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
              in_patch = 1
              patch_path = line
              next
            }
            /<!-- \/AI_PATCH -->/ {
              if (in_patch) {
                print "FILE:" patch_path >> "/tmp/patch_files.txt"
                close("/tmp/patch_files.txt")
                in_patch = 0
                patch_path = ""
                next
              }
            }
            in_patch {
              outfile = "/tmp/patch_content_" patch_path
              print >> outfile
              close(outfile)
            }
          ' /tmp/ai_response.txt 2>/dev/null || true

          if [ ! -f /tmp/patch_files.txt ]; then
            echo "⚠️ 未能解析任何 AI_PATCH 块，跳过 PR 创建"
            git checkout - 2>/dev/null || true
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── 逐个写入文件 ──────────────────────────────────
          while IFS=: read -r _ filepath; do
            content_file="/tmp/patch_content_${filepath}"
            if [ -f "$content_file" ]; then
              # 确保父目录存在
              mkdir -p "$(dirname "$filepath")"
              cp "$content_file" "$filepath"
              echo "  ✅ Wrote: $filepath ($(wc -l < "$filepath") lines)"
              PATCH_COUNT=$((PATCH_COUNT + 1))
            fi
          done < /tmp/patch_files.txt

          if [ "$PATCH_COUNT" -eq 0 ]; then
            echo "⚠️ 没有有效的补丁文件，跳过 PR 创建"
            git checkout - 2>/dev/null || true
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "📦 共 $PATCH_COUNT 个文件已修改"

          # ── 提取 PR 标题和正文 ────────────────────────────
          # <!-- AI_PR --> 内部格式：第一行是标题，| 之后是正文
          awk '
            /<!-- AI_PR -->/ { in_pr=1; next }
            /<!-- \/AI_PR -->/ { in_pr=0; next }
            in_pr { print }
          ' /tmp/ai_response.txt > /tmp/pr_raw.txt

          if [ -s /tmp/pr_raw.txt ]; then
            PR_TITLE=$(head -1 /tmp/pr_raw.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            # 去掉标题行首的 | 分隔符（如果有）
            PR_TITLE=$(echo "$PR_TITLE" | sed 's/^|\s*//')
            # 正文从第 2 行开始（跳过 | 行如果有的话）
            PR_BODY=$(tail -n +2 /tmp/pr_raw.txt | sed 's/^|\s*//')
            # 追加自动标记
            PR_BODY="${PR_BODY}

          ---
          <sub>🤖 此 PR 由 AI 自动生成（issue #${ISSUE_NUMBER}）· Workflow: \`.github/workflows/ai-responder.yml\` · 请维护者审查后合并</sub>"
          else
            PR_TITLE="ai-fix: issue #${ISSUE_NUMBER} 自动修复"
            PR_BODY="🤖 此 PR 由 AI 基于 issue #${ISSUE_NUMBER} 自动生成，请审查后合并。"
          fi

          # 清理标题（去特殊字符，限长）
          PR_TITLE=$(echo "$PR_TITLE" | head -1 | cut -c1-72)
          echo "📝 PR 标题: $PR_TITLE"

          # ── 提交并推送 ────────────────────────────────────
          git add -A
          git commit -m "$PR_TITLE" || { echo "⚠️ 没有变更需要提交"; git checkout - 2>/dev/null || true; echo "pr_url=" >> "$GITHUB_OUTPUT"; exit 0; }
          git push origin "$BRANCH" 2>&1 || { echo "⚠️ Push 失败"; git checkout - 2>/dev/null || true; echo "pr_url=" >> "$GITHUB_OUTPUT"; exit 0; }

          # ── 创建 PR ────────────────────────────────────────
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            2>&1) || { echo "⚠️ PR 创建失败: $PR_URL"; echo "pr_url=" >> "$GITHUB_OUTPUT"; exit 0; }

          echo "🔗 PR created: $PR_URL"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "patch_count=${PATCH_COUNT}" >> "$GITHUB_OUTPUT"

      # ── 步骤 4：发布回复评论 ──────────────────────────────
      - name: Post reply to issue
        if: steps.llm.outputs.skipped != 'true'
        uses: actions/github-script@v7
        env:
          AI_REPLY: ${{ steps.llm.outputs.reply }}
          AI_MODEL: ${{ steps.tier.outputs.model }}
          AI_TIER: ${{ steps.tier.outputs.tier_label }}
          CODE_MOD: ${{ steps.tier.outputs.code_mod }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        with:
          script: |
            const aiReply = process.env.AI_REPLY || '(AI 回复为空，请等维护者人工回复)';
            const model   = process.env.AI_MODEL || 'deepseek-v4-flash';
            const tier    = process.env.AI_TIER  || 'AI 自动回复';
            const codeMod = process.env.CODE_MOD || 'false';
            const prUrl   = process.env.PR_URL   || '';

            // ── 构建 footer ──────────────────────────────────
            const footerLines = [
              '---',
            ];
            if (prUrl) {
              footerLines.push(
                `<sub>Model: \`${model}\` · Tier: ${tier} · 🔗 PR: ${prUrl} · Workflow: \`.github/workflows/ai-responder.yml\` · 想要更深度分析请在评论里 \`/ai-help\` · AI 自动生成，最终处理请等维护者 @ivansolis1989</sub>`
              );
            } else if (codeMod === 'true') {
              footerLines.push(
                `<sub>Model: \`${model}\` · Tier: ${tier}（含代码修改权限，但本次未触发修改） · Workflow: \`.github/workflows/ai-responder.yml\` · 想要更深度分析请在评论里 \`/ai-help\` · AI 自动生成，最终处理请等维护者 @ivansolis1989</sub>`
              );
            } else {
              footerLines.push(
                `<sub>Model: \`${model}\` · Tier: ${tier} · Workflow: \`.github/workflows/ai-responder.yml\` · 想要更深度分析请在评论里 \`/ai-help\` · AI 无代码修改权限，最终处理请等维护者 @ivansolis1989</sub>`
              );
            }

            const commentBody = [
              `> 🤖 **AI 自动回复**（${tier}，仅供参考）`,
              '',
              aiReply,
              ...footerLines,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

      - name: Notify missing secret
        if: steps.llm.outputs.skipped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = [
              '> ⚠️ AI 助手未就绪',
              '',
              '仓库维护者需要先在 Settings → Secrets and variables → Actions 里配置 `DEEPSEEK_API_KEY`，此 issue 将等人工回复。',
              '',
              '<sub>Workflow: `.github/workflows/ai-responder.yml`</sub>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
