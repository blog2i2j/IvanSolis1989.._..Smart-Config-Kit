# ════════════════════════════════════════════════════════════════════════════
#  Smart-Config-Kit for Passwall — Shunt Rules Consolidated Reference
#  Version: v5.3.0-pw.3 | Build: 2026-04-26
#  Baseline: Clash Party v5.3.0（展平版；适用 Passwall 全功能版，
#            Passwall / Passwall2 共用 shunt_rules.lua，同一份 .list 互通）
# ────────────────────────────────────────────────────────────────────────────
#  ⚠️ 注意：本 .conf 文件为手动配置参考；推荐使用同目录 .sh 脚本自动创建 31 条规则
#  变更：v5.3.0-pw.3 — 跟随基线将流媒体重组为按平台分组（25 → 31 条规则）
#    • 移除 📺 东南亚流媒体 + 🇺🇸 美国流媒体，拆分为 7 个平台组
#    • 新增 Netflix/Disney+/HBO/Max/Hulu/Prime Video/YouTube/音乐/其他国外流媒体
#    • 规则数从 v5.2.10 的 25 条扩展为 31 条
# ────────────────────────────────────────────────────────────────────────────
#  规则语法（xray / sing-box 原生域名匹配语法；两者共用同一解析器）：
#    （无前缀）   纯字符串子串匹配       sina.com 命中 sina.com.cn / www.sina.com
#    domain:     子域名匹配（推荐）      domain:v2ray.com 命中 v2ray.com / www.v2ray.com
#    full:       完整匹配               full:v2ray.com 只命中 v2ray.com
#    regexp:     正则                   regexp:\.goo.*\.com$
#    geosite:    V2Ray geosite.dat 分类  geosite:cn / geosite:google
#    rule-set:remote:<url>              sing-box .srs 远程规则集
#    rule-set:local:<path>              sing-box .srs 本地规则集
#    IP 列表字段：geoip:<tag> / CIDR / rule-set:
#    #           行首注释
#  ⚠️  不要用 Clash 的 DOMAIN-SUFFIX, / DOMAIN-KEYWORD, / DOMAIN, 前缀——不识别。
#
#  Passwall 全功能版额外能力（本 .conf 不覆盖，见 README.md §"Passwall 专属增强"）：
#    • 四列表系统（直连/屏蔽/GFW/代理）— 可替代或补充 shunt rule
#    • TCP/UDP 节点分选（tcp_node / udp_node）
#    • ACL 规则（按客户端 IP/MAC 指定不同策略）
#    • trojan-plus 节点类型
#
#  用法：
#    方式 A（UI 手工）：按顺序打开 Passwall LuCI → 分流控制 → 新增，
#                       把每条规则 [Domain List] 段里的非注释行粘贴进"域名列表"字段，
#                       [IP List] 段粘贴进"IP 列表"字段，目标节点按"推荐出站"选
#                       （你需要提前在节点列表里建好对应区域的负载均衡组）。
#     方式 B（脚本批量）：见同目录 Passwall(xray+sing-box)-apply.sh（需 SSH 登录路由器）
#
#  规则数: 31 条   |  顺序约束: #01 广告拦截在最前；#29-#31（受限/国外/FINAL）保持末尾
#
#  更多说明见 Passwall/README.md
# ════════════════════════════════════════════════════════════════════════════

